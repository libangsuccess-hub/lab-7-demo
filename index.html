<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width = device-width, initial-scale = 1.0">
<title>Events</title>
<style>
    body{
        background-color: rgb(48, 47, 47);
    }
    
</style>
</head>
<body>
    <button id="btn">Click Me</button>
    <input  mouseover="change_background" type="text" id="input" placeholder="Type here">
    <script>
        document.getElementById("btn").addEventListener("click",  function(){
            alert("Button Clicked!");
        });
        document.getElementById("input").addEventListener("keyup", function(event){
            console.log("key pressed:" + event.key);
        });
        // add a mouseover event to change an element's background
        document.getElementById("input").addEventListener("mouseover", function(event){
            document.getElementById("input").style="color: green";
        });
       
            
    </script>
</body>
</html>
